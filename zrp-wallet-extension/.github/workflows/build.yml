name: Build Extension

permissions:
  contents: write

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "src/**"
      - "package.json"
      - "build.js"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm install

      - name: Build
        run: npm run build

      - name: Commit dist/
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "actions@github.com"
          git add dist -f
          git diff --staged --quiet || git commit -m "Build extension bundle (automated)"
          git push
