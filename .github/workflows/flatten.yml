name: Flatten SDK

permissions:
  contents: write

on:
  workflow_dispatch:

jobs:
  flatten:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Flatten directory
        id: flatten
        run: |
          if [ ! -d "zrp-wallet-extension" ]; then
            echo "already_flat=true" >> $GITHUB_OUTPUT
            echo "zrp-wallet-extension not found, nothing to flatten"
            exit 0
          fi

          shopt -s dotglob
          
          # Move each item individually, skipping existing directories like .github
          for item in zrp-wallet-extension/*; do
            target=$(basename "$item")
            if [ -e "$target" ]; then
              echo "Skipping $target (already exists at root)"
            else
              mv "$item" .
            fi
          done
          
          rmdir zrp-wallet-extension 2>/dev/null || true
          echo "already_flat=false" >> $GITHUB_OUTPUT

      - name: Commit changes
        if: steps.flatten.outputs.already_flat != 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "actions@github.com"
          git add -A
          git diff --staged --quiet || git commit -m "Flatten repo: move SDK files to root"
          git push
