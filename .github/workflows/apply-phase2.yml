name: Apply Phase 2 Update

permissions:
  contents: write

on:
  workflow_dispatch:

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Extract and overwrite files
        run: |
          # Find the zip file (supports different names)
          ZIP_FILE=$(find . -maxdepth 1 -name "*.zip" -type f | head -n 1)

          if [ -z "$ZIP_FILE" ]; then
            echo "❌ No zip file found in the repository root."
            echo "📌 Please upload a zip file named zrp-phase2b-metadata.zip or similar."
            exit 1
          fi

          echo "📦 Found zip: $ZIP_FILE"

          # Extract the zip
          unzip -o "$ZIP_FILE"
          rm -f "$ZIP_FILE"

          # Find the extracted directory (often phase2-package or similar)
          EXTRACTED_DIR=$(find . -maxdepth 1 -type d ! -path "." ! -path "./.git" ! -path "./.github" | head -n 1)

          if [ -z "$EXTRACTED_DIR" ]; then
            echo "❌ No extracted directory found."
            echo "📌 The zip might have extracted files directly – checking..."
            exit 0
          fi

          echo "📁 Extracted directory: $EXTRACTED_DIR"

          # Move everything from extracted directory to root
          shopt -s dotglob
          cp -rf "$EXTRACTED_DIR"/* . 2>/dev/null || true
          cp -rf "$EXTRACTED_DIR"/.* . 2>/dev/null || true
          shopt -u dotglob

          # Remove the extracted directory
          rm -rf "$EXTRACTED_DIR"

          # Clean up any leftover zip files
          rm -f *.zip

          echo "✅ Files extracted and moved to root successfully."

      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "actions@github.com"
          git add -A
          git diff --staged --quiet || git commit -m "Phase 2: SPL token support (from zip)"
          git push
