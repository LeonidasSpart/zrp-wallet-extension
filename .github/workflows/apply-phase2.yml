name: Apply Phase 2 Update

permissions:
  contents: write

on:
  workflow_dispatch:

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Move folder contents to root
        run: |
          # Find the folder (phase2-package, zrp-phase2b-metadata, etc.)
          FOLDER=$(find . -maxdepth 1 -type d ! -path "." ! -path "./.git" ! -path "./.github" | head -n 1)

          if [ -z "$FOLDER" ]; then
            echo "✅ No folder found – already flattened"
            exit 0
          fi

          echo "📁 Found folder: $FOLDER"

          # Move everything from the folder to root
          shopt -s dotglob
          mv "$FOLDER"/* . 2>/dev/null || true
          mv "$FOLDER"/.* . 2>/dev/null || true
          shopt -u dotglob

          # Remove the empty folder
          rm -rf "$FOLDER"

          echo "✅ Files moved to root"

      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "actions@github.com"
          git add -A
          git diff --staged --quiet || git commit -m "Phase 2: move files to root"
          git push
